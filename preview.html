<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ProspectFlow CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0b0f;--bg2:#111318;--bg3:#181b22;--bg4:#1e2230;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#e8eaf0;--text2:#8b90a0;--text3:#555a6b;
  --accent:#4f7fff;--accent2:#7c5cfc;--green:#10b981;--amber:#f59e0b;--orange:#f97316;
  --radius:14px;--radius-sm:8px;
  --shadow:0 4px 24px rgba(0,0,0,0.4);--shadow-card:0 2px 12px rgba(0,0,0,0.3);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
button{font-family:'DM Sans',sans-serif}
.app-shell{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:260px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:200;transform:translateX(-100%);transition:transform 0.28s cubic-bezier(.4,0,.2,1)}
.sidebar.open{transform:translateX(0)}
.sidebar-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:199;backdrop-filter:blur(2px)}
.hidden{display:none}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:24px 20px 20px;border-bottom:1px solid var(--border)}
.logo-dot{width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 0 12px rgba(79,127,255,0.5);flex-shrink:0}
.logo-text{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;letter-spacing:-0.3px;flex:1}
.sidebar-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:4px}
.sidebar-nav{flex:1;padding:16px 12px;display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:var(--radius-sm);background:none;border:none;color:var(--text2);cursor:pointer;width:100%;text-align:left;font-size:14px;font-weight:500;transition:all 0.15s}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(79,127,255,0.12);color:var(--accent)}
.nav-icon{font-size:16px;width:20px;text-align:center}
.sidebar-footer{padding:16px;border-top:1px solid var(--border)}
.user-info{display:flex;align-items:center;gap:12px}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer}
.user-name{font-size:13px;font-weight:500}
.user-plan{font-size:11px;color:var(--accent);font-weight:500}

/* MAIN */
.main-content{flex:1;display:flex;flex-direction:column;min-width:0}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;background:rgba(10,11,15,0.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:60px}
.topbar-left{display:flex;align-items:center;gap:14px}
.topbar-right{display:flex;align-items:center;gap:12px}
.logo-inline{display:flex;align-items:center;gap:8px}
.menu-btn{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;gap:5px;padding:4px}
.menu-btn span{display:block;width:20px;height:2px;background:var(--text2);border-radius:2px}
.btn-new-lead{background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s}
.btn-new-lead:hover{background:#3d6ee8;transform:translateY(-1px)}

/* PAGE */
.page-body{padding:24px 20px 40px;max-width:1100px;margin:0 auto;width:100%}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;gap:12px}
.page-label{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.page-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:700;letter-spacing:-0.5px}
.badge-today{font-size:12px;color:var(--text2);background:var(--bg3);border:1px solid var(--border);padding:6px 12px;border-radius:20px;white-space:nowrap;align-self:flex-start;margin-top:4px}

/* STAT CARDS */
.dashboard-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:32px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden;transition:transform 0.2s,box-shadow 0.2s;cursor:default}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.card-blue::before{background:linear-gradient(90deg,var(--accent),transparent)}
.card-indigo::before{background:linear-gradient(90deg,var(--accent2),transparent)}
.card-amber::before{background:linear-gradient(90deg,var(--amber),transparent)}
.card-green::before{background:linear-gradient(90deg,var(--green),transparent)}
.stat-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.stat-icon{font-size:18px;color:var(--text3)}
.card-blue .stat-icon{color:var(--accent)}
.card-indigo .stat-icon{color:var(--accent2)}
.card-amber .stat-icon{color:var(--amber)}
.card-green .stat-icon{color:var(--green)}
.stat-value{font-family:'Syne',sans-serif;font-size:32px;font-weight:700;letter-spacing:-1px}
.stat-label{font-size:13px;color:var(--text2);font-weight:500;margin-bottom:6px}
.stat-delta{font-size:11px;color:var(--text3);margin-bottom:12px}
.stat-bar{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden}
.stat-bar-fill{height:100%;border-radius:2px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.card-blue .stat-bar-fill{background:var(--accent)}
.card-indigo .stat-bar-fill{background:var(--accent2)}
.card-amber .stat-bar-fill{background:var(--amber)}
.card-green .stat-bar-fill{background:var(--green)}

/* LEAD SECTION */
.lead-section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap}
.section-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;display:flex;align-items:center;gap:10px}
.count-badge{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:2px 9px;border-radius:20px}
.search-box{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 14px;flex:1;max-width:320px;transition:border-color 0.15s}
.search-box:focus-within{border-color:var(--accent)}
.search-icon{color:var(--text3);font-size:18px}
.search-input{background:none;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;width:100%}
.search-input::placeholder{color:var(--text3)}
.filter-tabs{display:flex;gap:6px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.filter-tabs::-webkit-scrollbar{display:none}
.filter-tab{background:var(--bg2);border:1px solid var(--border);color:var(--text2);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all 0.15s}
.filter-tab:hover{border-color:var(--border2);color:var(--text)}
.filter-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* LEAD GRID */
.lead-grid{display:grid;grid-template-columns:1fr;gap:12px}

/* LEAD CARD */
.lead-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;transition:all 0.2s}
.lead-card:hover{border-color:var(--border2);box-shadow:var(--shadow-card);transform:translateY(-1px)}
.lead-card-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:12px}
.lead-avatar{width:42px;height:42px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.lead-info{flex:1;min-width:0}
.lead-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:600;margin-bottom:4px;letter-spacing:-0.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lead-meta{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.dot-sep{color:var(--text3)}
.lead-phone{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);margin-bottom:10px;flex-wrap:wrap}
.phone-icon{color:var(--text3)}
.website-tag{color:var(--accent);font-size:12px}
.lead-notes{font-size:12px;color:var(--text3);background:var(--bg3);border-radius:var(--radius-sm);padding:8px 12px;margin-bottom:14px;line-height:1.5}

/* STATUS */
.status-pill{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:0.3px;white-space:nowrap;flex-shrink:0}
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.status-novo{background:rgba(96,165,250,0.1);color:#60a5fa;border:1px solid rgba(96,165,250,0.2)}
.status-contatado{background:rgba(167,139,250,0.1);color:#a78bfa;border:1px solid rgba(167,139,250,0.2)}
.status-respondeu{background:rgba(251,191,36,0.1);color:#fbbf24;border:1px solid rgba(251,191,36,0.2)}
.status-negociacao{background:rgba(251,146,60,0.1);color:#fb923c;border:1px solid rgba(251,146,60,0.2)}
.status-fechado{background:rgba(52,211,153,0.1);color:#34d399;border:1px solid rgba(52,211,153,0.2)}

/* ACTIONS */
.lead-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn-whatsapp{display:flex;align-items:center;gap:7px;background:rgba(37,211,102,0.1);border:1px solid rgba(37,211,102,0.25);color:#25d366;border-radius:var(--radius-sm);padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s}
.btn-whatsapp:hover{background:rgba(37,211,102,0.18);transform:translateY(-1px)}
.btn-details{background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:var(--radius-sm);padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s}
.btn-details:hover{border-color:var(--border2);color:var(--text)}
.status-menu-wrap{position:relative}
.btn-status{background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:var(--radius-sm);padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s}
.btn-status:hover{border-color:var(--border2);color:var(--text)}
.status-dropdown{position:absolute;bottom:calc(100% + 6px);left:0;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);box-shadow:var(--shadow);min-width:150px;z-index:50;overflow:hidden}
.status-option{display:flex;align-items:center;gap:10px;width:100%;padding:10px 14px;background:none;border:none;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;text-align:left;transition:background 0.12s}
.status-option:hover{background:var(--bg4);color:var(--text)}
.status-option.active-opt{color:var(--text);background:rgba(255,255,255,0.04)}

/* EMPTY */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:12px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center}
.modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;animation:slideUp 0.28s cubic-bezier(.4,0,.2,1)}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;padding:24px 24px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:1}
.modal-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:4px}
.modal-nicho{font-size:12px;color:var(--text3)}
.modal-close{background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0}
.modal-close:hover{color:var(--text);border-color:var(--border2)}
.modal-body{padding:20px 24px 32px;display:flex;flex-direction:column;gap:20px}
.modal-status-row{display:flex;align-items:center;justify-content:space-between}
.modal-date{font-size:12px;color:var(--text3)}
.modal-fields{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.modal-field label{font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);margin-bottom:4px;display:block}
.modal-field p{font-size:14px;font-weight:500}
.modal-notes label{font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);margin-bottom:8px;display:block}
.modal-notes p{font-size:13px;color:var(--text2);line-height:1.6;background:var(--bg3);padding:12px;border-radius:var(--radius-sm)}
.modal-status-change label{font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);margin-bottom:10px;display:block}
.status-btn-group{display:flex;gap:8px;flex-wrap:wrap}
.status-btn-opt{padding:7px 14px;border-radius:20px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s}
.status-btn-opt.selected{font-weight:700}
.modal-wa{width:100%;justify-content:center;padding:12px;font-size:14px}

/* RESPONSIVE */
@media(min-width:640px){
  .dashboard-cards{grid-template-columns:repeat(4,1fr)}
  .lead-grid{grid-template-columns:repeat(2,1fr)}
  .modal-overlay{align-items:center;padding:20px}
  .modal-box{border-radius:var(--radius)}
}
@media(min-width:1024px){
  .sidebar{transform:translateX(0)}
  .sidebar-close{display:none}
  .main-content{margin-left:260px}
  .menu-btn{display:none}
  .logo-inline{display:none}
}
</style>
</head>
<body>
<div class="app-shell">

  <!-- SIDEBAR -->
  <div id="sidebarBackdrop" class="sidebar-backdrop hidden" onclick="closeSidebar()"></div>
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-dot"></div>
      <span class="logo-text">ProspectFlow</span>
      <button class="sidebar-close" onclick="closeSidebar()">✕</button>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active"><span class="nav-icon">▣</span><span>Dashboard</span></button>
      <button class="nav-item"><span class="nav-icon">◈</span><span>Leads</span></button>
      <button class="nav-item"><span class="nav-icon">◎</span><span>Pipeline</span></button>
      <button class="nav-item"><span class="nav-icon">◆</span><span>Relatórios</span></button>
      <button class="nav-item"><span class="nav-icon">⚙</span><span>Configurações</span></button>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="avatar">JD</div>
        <div><p class="user-name">João Developer</p><p class="user-plan">Plano Pro</p></div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-btn" onclick="openSidebar()"><span></span><span></span><span></span></button>
        <div class="logo-inline"><div class="logo-dot"></div><span class="logo-text">ProspectFlow</span></div>
      </div>
      <div class="topbar-right">
        <button class="btn-new-lead" onclick="alert('Formulário de novo lead em breve!')">+ Novo Lead</button>
        <div class="avatar">JD</div>
      </div>
    </header>

    <main class="page-body">
      <div class="page-header">
        <div>
          <p class="page-label">CRM de Prospecção</p>
          <h1 class="page-title">Dashboard</h1>
        </div>
        <div class="badge-today" id="dateToday"></div>
      </div>

      <!-- STATS -->
      <section class="dashboard-cards" id="statsSection"></section>

      <!-- LEADS -->
      <section>
        <div class="lead-section-header">

          <div class="search-box">
            <span class="search-icon">⌕</span>
            <input class="search-input" type="text" placeholder="Buscar empresa, nicho, cidade..." oninput="filterLeads(this.value)"/>
          </div>
        </div>
        <div class="filter-tabs" id="filterTabs"></div>
        <div class="lead-grid" id="leadGrid"></div>
      </section>
    </main>
  </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal-overlay hidden" onclick="closeModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div><h2 class="modal-title" id="mTitle"></h2><span class="modal-nicho" id="mNicho"></span></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="mBody"></div>
  </div>
</div>

<script>
const STATUS_CONFIG = {

const STATUS_FILTERS = ["Todos","Novo","Contatado","Respondeu","Negociação","Fechado"];

let leads = [
  {id:1,empresa:"Barbearia Corte Nobre",nicho:"Barbearia",cidade:"São Paulo, SP",telefone:"(11) 98234-5678",status:"Novo",contato:"Rafael Mendes",website:null,notas:"Não possui site. Instagram com 2k seguidores.",createdAt:"2025-04-20"},

  {id:3,empresa:"Auto Center Vitória",nicho:"Mecânica",cidade:"Santo André, SP",telefone:"(11) 93456-7890",status:"Respondeu",contato:"Carlos Vitória",website:null,notas:"Demonstrou interesse. Pedir reunião.",createdAt:"2025-04-18"},
  {id:4,empresa:"Restaurante Sabor da Terra",nicho:"Gastronomia",cidade:"Osasco, SP",telefone:"(11) 91234-5678",status:"Negociação",contato:"Ana Paula Ferreira",website:"sabordaterra.com",notas:"Reunião feita. Enviando proposta hoje.",createdAt:"2025-04-17"},
  {id:5,empresa:"Studio Pilates Corpo e Mente",nicho:"Saúde & Fitness",cidade:"São Bernardo, SP",telefone:"(11) 94567-8901",status:"Fechado",contato:"Juliana Rocha",website:null,notas:"Contrato assinado. Pagamento recebido.",createdAt:"2025-04-15"},
  {id:6,empresa:"Farmácia Central Vida",nicho:"Farmácia",cidade:"Guarulhos, SP",telefone:"(11) 95678-9012",status:"Novo",contato:"Pedro Alves",website:"farmaciavidacentral.com.br",notas:"Encontrado via Google Maps.",createdAt:"2025-04-21"},
  {id:7,empresa:"Pet Shop Mundo Animal",nicho:"Pet Shop",cidade:"Mogi das Cruzes, SP",telefone:"(11) 96789-0123",status:"Contatado",contato:"Fernanda Lima",website:null,notas:"Primeiro contato feito via WhatsApp.",createdAt:"2025-04-20"},
  {id:8,empresa:"Advocacia Matos & Souza",nicho:"Advocacia",cidade:"São Paulo, SP",telefone:"(11) 97890-1234",status:"Respondeu",contato:"Dr. Henrique Matos",website:"matossouza.adv.br",notas:"Respondeu interessado. Marcar call.",createdAt:"2025-04-16"},
];

let activeFilter = "Todos";
let searchQuery = "";

// Date
document.getElementById("dateToday").textContent = new Date().toLocaleDateString("pt-BR",{weekday:"long",day:"2-digit",month:"long"});

// Sidebar
function openSidebar(){document.getElementById("sidebar").classList.add("open");document.getElementById("sidebarBackdrop").classList.remove("hidden")}
function closeSidebar(){document.getElementById("sidebar").classList.remove("open");document.getElementById("sidebarBackdrop").classList.add("hidden")}

// Stats
function renderStats(){
  const total = leads.length;
  const contatados = leads.filter(l=>["Contatado","Respondeu","Negociação","Fechado"].includes(l.status)).length;
  const responderam = leads.filter(l=>["Respondeu","Negociação","Fechado"].includes(l.status)).length;
  const fechados = leads.filter(l=>l.status==="Fechado").length;
  const cards = [
    {label:"Total de Leads",val:total,icon:"◈",cls:"card-blue",delta:"+3 esta semana",pct:100},
    {label:"Contatados",val:contatados,icon:"◎",cls:"card-indigo",delta:`${Math.round(contatados/total*100)}% do total`,pct:(contatados/total)*100},
    {label:"Responderam",val:responderam,icon:"◉",cls:"card-amber",delta:`${Math.round(responderam/total*100)}% de resposta`,pct:(responderam/total)*100},
    {label:"Fechados",val:fechados,icon:"◆",cls:"card-green",delta:`${Math.round(fechados/total*100)}% de conversão`,pct:(fechados/total)*100},
  ];
  document.getElementById("statsSection").innerHTML = cards.map(c=>`
    <div class="stat-card ${c.cls}">
      <div class="stat-card-top"><span class="stat-icon">${c.icon}</span><span class="stat-value">${c.val}</span></div>
      <div class="stat-label">${c.label}</div>
      <div class="stat-delta">${c.delta}</div>
      <div class="stat-bar"><div class="stat-bar-fill" style="width:${Math.min(c.pct,100)}%"></div></div>
    </div>
  `).join("");
}

// Filter tabs
function renderFilterTabs(){
  document.getElementById("filterTabs").innerHTML = STATUS_FILTERS.map(s=>`
    <button class="filter-tab ${activeFilter===s?'active':''}" onclick="setFilter('${s}')">${s}</button>
  `).join("");
}

function setFilter(f){activeFilter=f;renderFilterTabs();renderLeads()}
function filterLeads(q){searchQuery=q;renderLeads()}

// Status pill HTML
function statusPill(status){
  const cfg = STATUS_CONFIG[status]||STATUS_CONFIG["Novo"];
  return `<span class="status-pill ${cfg.cls}"><span class="status-dot" style="background:${cfg.dot}"></span>${status}</span>`;
}

// Leads
function renderLeads(){
  const filtered = leads.filter(l=>{
    const mS = activeFilter==="Todos"||l.status===activeFilter;
    const mQ = !searchQuery||[l.empresa,l.nicho,l.cidade].some(v=>v.toLowerCase().includes(searchQuery.toLowerCase()));
    return mS&&mQ;
  });
  document.getElementById("leadCount").textContent = filtered.length;
  if(!filtered.length){
    document.getElementById("leadGrid").innerHTML=`<div class="empty-state"><div class="empty-icon">◈</div><p>Nenhum lead encontrado</p></div>`;
    return;
  }
  document.getElementById("leadGrid").innerHTML = filtered.map(l=>{
    const icon = NICHO_ICONS[l.nicho]||l.empresa[0];
    return `
    <div class="lead-card">
      <div class="lead-card-top">
        <div class="lead-avatar">${icon}</div>
        <div class="lead-info">
          <h3 class="lead-name">${l.empresa}</h3>
          <div class="lead-meta"><span>${l.nicho}</span><span class="dot-sep">·</span><span>${l.cidade}</span></div>
        </div>
        ${statusPill(l.status)}
      </div>
      <div class="lead-phone"><span class="phone-icon">☎</span><span>${l.telefone}</span>${l.website?`<span class="dot-sep">·</span><span class="website-tag">🔗 ${l.website}</span>`:''}</div>
      ${l.notas?`<p class="lead-notes">${l.notas}</p>`:''}
      <div class="lead-actions">
        <button class="btn-whatsapp" onclick="openWhatsApp(${l.id})">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.124.554 4.118 1.524 5.845L.057 23.492a.5.5 0 00.614.614l5.647-1.467A11.946 11.946 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.882a9.882 9.882 0 01-5.032-1.374l-.36-.214-3.732.969.992-3.617-.235-.374A9.88 9.88 0 012.118 12C2.118 6.54 6.54 2.118 12 2.118S21.882 6.54 21.882 12 17.46 21.882 12 21.882z"/></svg>
          WhatsApp
        </button>
        <button class="btn-details" onclick="openModal(${l.id})">Ver detalhes</button>
        <div class="status-menu-wrap" id="wrap-${l.id}">
          <button class="btn-status" onclick="toggleStatusMenu(${l.id})">Status ▾</button>
          <div class="status-dropdown hidden" id="dd-${l.id}">
            ${STATUS_OPTIONS.map(s=>`<button class="status-option ${l.status===s?'active-opt':''}" onclick="changeStatus(${l.id},'${s}')"><span class="status-dot" style="background:${STATUS_CONFIG[s].dot}"></span>${s}</button>`).join("")}
          </div>
        </div>
      </div>
    </div>`;
  }).join("");
}

function toggleStatusMenu(id){
  const dd = document.getElementById(`dd-${id}`);
  dd.classList.toggle("hidden");
  // close others
  document.querySelectorAll('.status-dropdown').forEach(d=>{if(d.id!==`dd-${id}`)d.classList.add("hidden")});
}

function changeStatus(id, status){
  leads = leads.map(l=>l.id===id?{...l,status}:l);
  renderStats();renderLeads();closeModal();
}

function openWhatsApp(id){
  const l = leads.find(x=>x.id===id);
  const clean = l.telefone.replace(/\D/g,'');
  const msg = encodeURIComponent(`Olá ${l.contato||l.empresa}! Gostaria de conversar sobre como podemos ajudar ${l.empresa} a crescer online.`);
  window.open(`https://wa.me/55${clean}?text=${msg}`,'_blank');
}

// Modal
function openModal(id){
  const l = leads.find(x=>x.id===id);
  const cfg = STATUS_CONFIG[l.status];
  document.getElementById("mTitle").textContent = l.empresa;
  document.getElementById("mNicho").textContent = l.nicho;
  document.getElementById("mBody").innerHTML = `
    <div class="modal-status-row">
      ${statusPill(l.status)}
      <span class="modal-date">Adicionado em ${new Date(l.createdAt).toLocaleDateString("pt-BR")}</span>
    </div>
    <div class="modal-fields">
      <div class="modal-field"><label>Contato</label><p>${l.contato||"—"}</p></div>
      <div class="modal-field"><label>Telefone</label><p>${l.telefone}</p></div>
      <div class="modal-field"><label>Cidade</label><p>${l.cidade}</p></div>
      <div class="modal-field"><label>Website</label><p>${l.website||"Sem site"}</p></div>
    </div>
    ${l.notas?`<div class="modal-notes"><label>Notas</label><p>${l.notas}</p></div>`:''}
    <div class="modal-status-change">
      <label>Alterar Status</label>
      <div class="status-btn-group">
        ${STATUS_OPTIONS.map(s=>`
          <button class="status-btn-opt ${l.status===s?'selected':''}"
            style="${l.status===s?`border-color:${STATUS_CONFIG[s].dot};color:${STATUS_CONFIG[s].dot}`:''}"
            onclick="changeStatus(${l.id},'${s}')">
            ${s}
          </button>
        `).join("")}
      </div>
    </div>
    <button class="btn-whatsapp modal-wa" onclick="openWhatsApp(${l.id})">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.124.554 4.118 1.524 5.845L.057 23.492a.5.5 0 00.614.614l5.647-1.467A11.946 11.946 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.882a9.882 9.882 0 01-5.032-1.374l-.36-.214-3.732.969.992-3.617-.235-.374A9.88 9.88 0 012.118 12C2.118 6.54 6.54 2.118 12 2.118S21.882 6.54 21.882 12 17.46 21.882 12 21.882z"/></svg>
      Abrir WhatsApp
    </button>
  `;
  document.getElementById("modal").classList.remove("hidden");
}

function closeModal(e){
  if(!e||e.target===document.getElementById("modal")){
    document.getElementById("modal").classList.add("hidden");
  }
}

// Close dropdowns on outside click
document.addEventListener('click',e=>{
  if(!e.target.classList.contains('btn-status')&&!e.target.closest('.status-dropdown')){
    document.querySelectorAll('.status-dropdown').forEach(d=>d.classList.add("hidden"));
  }
});

// Init
renderStats();
renderFilterTabs();
renderLeads();
</script>
</body>
</html>
